<!DOCTYPE html>
<html>
<head>
  <title>DG Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7931a, #ffb347);
      margin: 0;
      padding: 0;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .card {
      background: white;
      color: black;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      background: #f7931a;
      border: none;
      color: white;
      border-radius: 10px;
      width: 95%;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>

<body>

<h1>🚀 DG Wallet</h1>

<div class="card">
  <h3>Create Account</h3>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
</div>

<div class="card">
  <h3>Login</h3>
  <input id="lemail" placeholder="Email">
  <input id="lpass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="card" id="dashboard">
  <h3>Balance</h3>
  <h2><span id="balance">0</span> DGW</h2>
  <button onclick="mine()">Start Mining</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx4UDcBBNZ1o-6WvOTWEoonSaF3YbgdQXBnmSuXlnxbZ1O1oiihEctj7ATF05RObRczXQ/exec";

let user_id = "";

// ✅ FIXED SIGNUP
async function signup() {
  const nameVal = document.getElementById("name").value.trim();
  const emailVal = document.getElementById("email").value.trim();
  const passVal = document.getElementById("pass").value.trim();

  console.log("DEBUG:", nameVal, emailVal, passVal); // 👈 debug

  if (!nameVal || !emailVal || !passVal) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "signup",
      name: nameVal,
      email: emailVal,
      password: passVal
    })
  });

  const data = await res.json();
  alert(JSON.stringify(data));
}

// ✅ FIXED LOGIN
async function login() {
  const emailVal = document.getElementById("lemail").value.trim();
  const passVal = document.getElementById("lpass").value.trim();

  if (!emailVal || !passVal) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      email: emailVal,
      password: passVal
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    user_id = data.user_id;
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("balance").innerText = data.balance;
  } else {
    alert("Login failed");
  }
}

// ✅ MINING
async function mine() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "mine",
      user_id: user_id
    })
  });

  const data = await res.json();
  document.getElementById("balance").innerText = data.balance;
}
</script>

</body>
</html>
