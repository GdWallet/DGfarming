<!DOCTYPE html>
<html>
<head>
  <title>DG Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7931a, #ffb347);
      margin: 0;
      padding: 0;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    .card {
      background: white;
      color: black;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: #f7931a;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      width: 90%;
      font-size: 16px;
    }

    button:hover {
      background: #e67e00;
    }

    #dashboard {
      display: none;
    }

    .logout {
      background: red;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<h1>🚀 DG Wallet</h1>

<div class="container">

  <!-- SIGNUP -->
  <div class="card">
    <h3>Create Account</h3>
    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="signup()">Signup</button>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input id="lemail" placeholder="Email"><br>
    <input id="lpass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div class="card" id="dashboard">
    <h3>💰 Balance</h3>
    <h2><span id="balance">0</span> DGW</h2>

    <button onclick="mine()">⛏️ Start Mining</button>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx4UDcBBNZ1o-6WvOTWEoonSaF3YbgdQXBnmSuXlnxbZ1O1oiihEctj7ATF05RObRczXQ/exec";

let user_id = localStorage.getItem("user_id") || "";

// 🔹 AUTO LOGIN
if (user_id) {
  document.getElementById("dashboard").style.display = "block";
}

// 🔹 SIGNUP
async function signup() {
  if (!name.value || !email.value || !pass.value) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "signup",
      name: name.value,
      email: email.value,
      password: pass.value
    })
  });

  const data = await res.json();
  alert(data.message || "Signup Success");
}

// 🔹 LOGIN
async function login() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      email: lemail.value,
      password: lpass.value
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    user_id = data.user_id;
    localStorage.setItem("user_id", user_id);

    document.getElementById("dashboard").style.display = "block";
    document.getElementById("balance").innerText = data.balance;
  } else {
    alert("Login failed");
  }
}

// 🔹 MINING
async function mine() {
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "mine",
      user_id: user_id
    })
  });

  const data = await res.json();

  if (data.status === "success") {
    document.getElementById("balance").innerText = parseFloat(data.balance).toFixed(4);
  } else {
    alert("Mining failed");
  }
}

// 🔹 LOGOUT
function logout() {
  localStorage.removeItem("user_id");
  location.reload();
}

</script>

</body>
</html>
