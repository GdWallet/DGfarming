<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DG WALLET - DollGo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .menu-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100%;
      background: #0f172a;
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s ease;
      z-index: 1000;
      padding: 2rem 1rem;
      box-shadow: 2px 0 20px rgba(0,0,0,0.3);
    }

    .drawer.open {
      left: 0;
    }

    .drawer a {
      display: block;
      color: #cbd5e1;
      text-decoration: none;
      padding: 0.8rem 1rem;
      margin: 0.5rem 0;
      border-radius: 16px;
      transition: 0.2s;
    }

    .drawer a:hover, .drawer a:active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .drawer .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.8rem;
      float: right;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(3px);
      z-index: 999;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .balance-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .balance-amount {
      font-size: 2rem;
      font-weight: 700;
      color: #facc15;
    }

    .badge {
      background: #334155;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .verified {
      background: #10b981;
      color: white;
    }

    .unverified {
      background: #ef4444;
    }

    button {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      margin-top: 0.5rem;
    }

    button:active {
      transform: scale(0.98);
    }

    .grid-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 40px;
      border: 1px solid #475569;
      background: #1e293b;
      color: white;
      margin-bottom: 0.8rem;
    }

    .alert {
      padding: 0.8rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .alert-error {
      background: rgba(239,68,68,0.2);
      border-left: 4px solid #ef4444;
    }

    .alert-success {
      background: rgba(16,185,129,0.2);
      border-left: 4px solid #10b981;
    }

    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      margin-right: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
    }

    .address {
      font-size: 0.7rem;
      font-family: monospace;
      background: #00000030;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 2rem;
    }

    .admin-panel {
      background: #0f172a;
      border-radius: 32px;
      padding: 1.2rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="logo">DG WALLET</div>
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>

  <div class="drawer" id="drawer">
    <button class="close-btn" id="closeDrawer">✕</button>
    <a href="#" data-page="dashboard">📊 Dashboard</a>
    <a href="#" data-page="create">✨ Create Wallet</a>
    <a href="#" data-page="farming">🌾 Farming Account</a>
    <a href="#" data-page="mainFarming">💰 Main Wallet Farming</a>
    <a href="#" data-page="transfer">💸 Transfer</a>
    <a href="#" data-page="internal">🔄 Farming → Main</a>
    <a href="#" data-page="admin">⚙️ Admin Panel</a>
    <hr style="margin: 1rem 0; border-color: #334155;">
    <a href="#" data-page="howto">📘 How to Create Wallet</a>
    <a href="#" data-page="verify">✅ How to Get Verified</a>
  </div>
  <div class="overlay" id="overlay"></div>

  <div id="mainContent">
    <div class="card" style="text-align: center;">
      <h3>Welcome to DG WALLET</h3>
      <p>Simulated crypto wallet with DGUSDT token</p>
      <button id="createWalletBtn">Create New Wallet</button>
    </div>
  </div>
  <footer>DG WALLET • DollGo Token • 1 DGUSDT = 1 USD</footer>
</div>

<script>
  // ========================
  // YOUR NEW WEB APP URL
  // ========================
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxfrq3wxjI_2V0he_tUTs2TrPWiWcz16bx2QSojij6ndWF-BGIFjAHZkHUKZt6mQ6ojig/exec";

  let currentUser = null;

  // Helper: call backend
  async function callBackend(action, payload = {}) {
    const body = { action, ...payload };
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(body),
      headers: { 'Content-Type': 'application/json' }
    });
    const json = await response.json();
    if (!json.success) throw new Error(json.error);
    return json.data;
  }

  async function refreshUserData() {
    if (!currentUser || !currentUser.publicAddress) return;
    try {
      const data = await callBackend("getUserData", { address: currentUser.publicAddress });
      currentUser = { ...currentUser, ...data };
      renderDashboard();
    } catch (err) {
      showAlert(err.message, "error");
    }
  }

  function renderDashboard() {
    if (!currentUser) {
      document.getElementById('mainContent').innerHTML = `
        <div class="card" style="text-align: center;">
          <h3>No wallet loaded</h3>
          <button id="createWalletBtn">Create New Wallet</button>
        </div>
      `;
      document.getElementById('createWalletBtn')?.addEventListener('click', createWallet);
      return;
    }

    const avatar = currentUser.avatar;
    const verifiedClass = currentUser.isVerified ? "verified" : "unverified";
    const verifiedText = currentUser.isVerified ? "Verified ✓" : "Unverified";
    const frozenBadge = currentUser.isFrozen ? "🔒 Frozen" : "";

    document.getElementById('mainContent').innerHTML = `
      <div class="card">
        <div class="user-info">
          <div class="avatar-circle" style="background: ${avatar.color}">${avatar.initial}</div>
          <div>
            <strong>${currentUser.publicAddress}</strong>
            <div class="address">${currentUser.publicAddress.slice(0,8)}...${currentUser.publicAddress.slice(-4)}</div>
          </div>
        </div>
        <div class="balance-row">
          <span>💰 Main Wallet</span>
          <span class="balance-amount">${currentUser.mainBalance.toFixed(2)} DGUSDT</span>
        </div>
        <div class="balance-row">
          <span>🌾 Farming Wallet</span>
          <span class="balance-amount">${currentUser.farmingBalance.toFixed(2)} DGUSDT</span>
        </div>
        <div>
          <span class="badge ${verifiedClass}">${verifiedText}</span>
          ${frozenBadge ? `<span class="badge" style="background:#ef4444">${frozenBadge}</span>` : ''}
        </div>
      </div>
      <div class="grid-buttons">
        <button id="dailyCheckinBtn">🌾 Daily Check-in (+0.1)</button>
        <button id="mainFarmingBtn">⚡ Main Farming (+1)</button>
        <button id="transferBtn">💸 Transfer</button>
        <button id="internalBtn">🔄 Farming→Main</button>
      </div>
    `;

    document.getElementById('dailyCheckinBtn')?.addEventListener('click', async () => {
      try {
        await callBackend("dailyCheckIn", { address: currentUser.publicAddress });
        showAlert("Daily check-in successful! +0.1 DGUSDT", "success");
        refreshUserData();
      } catch (err) { showAlert(err.message, "error"); }
    });
    document.getElementById('mainFarmingBtn')?.addEventListener('click', async () => {
      try {
        await callBackend("mainFarmingCheckIn", { address: currentUser.publicAddress });
        showAlert("Main wallet farming reward claimed! +1 DGUSDT", "success");
        refreshUserData();
      } catch (err) { showAlert(err.message, "error"); }
    });
    document.getElementById('transferBtn')?.addEventListener('click', () => showPage('transfer'));
    document.getElementById('internalBtn')?.addEventListener('click', () => showPage('internal'));
  }

  async function createWallet() {
    try {
      const data = await callBackend("createWallet");
      currentUser = {
        publicAddress: data.publicAddress,
        avatar: data.avatar,
        mainBalance: data.mainBalance,
        farmingBalance: data.farmingBalance,
        isVerified: data.isVerified,
        isFrozen: false
      };
      showAlert(`Wallet created! Address: ${data.publicAddress}`, "success");
      renderDashboard();
      localStorage.setItem('dgUser', JSON.stringify(currentUser));
    } catch (err) {
      showAlert(err.message, "error");
    }
  }

  async function loadStoredUser() {
    const stored = localStorage.getItem('dgUser');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        const fresh = await callBackend("getUserData", { address: parsed.publicAddress });
        currentUser = { ...parsed, ...fresh };
        renderDashboard();
      } catch (e) {
        console.warn("Stored user invalid, create new.");
        localStorage.removeItem('dgUser');
      }
    }
  }

  async function adminLogin() {
    const pwd = prompt("Enter admin password:");
    if (!pwd) return false;
    window.adminPassword = pwd;
    try {
      await callBackend("admin", { adminAction: "listUsers", params: {}, password: pwd });
      showAlert("Admin logged in", "success");
      return true;
    } catch (err) {
      showAlert("Wrong password", "error");
      return false;
    }
  }

  async function showAdminPanel() {
    if (!window.adminPassword) {
      const ok = await adminLogin();
      if (!ok) return;
    }
    try {
      const users = await callBackend("admin", { adminAction: "listUsers", params: {}, password: window.adminPassword });
      const transactions = await callBackend("admin", { adminAction: "listTransactions", params: {}, password: window.adminPassword });
      let html = `<div class="admin-panel"><h3>Admin Panel</h3>
        <h4>Users</h4><table style="width:100%;font-size:12px;">`;
      users.forEach(u => {
        html += `<tr><td>${u.publicAddress.slice(0,8)}</td><td>${u.mainBalance}</td><td>${u.farmingBalance}</td><td>${u.isVerified}</td><td>${u.isFrozen}</td> </tr>`;
      });
      html += `</table><h4>Recent Transactions</h4><table style="width:100%;font-size:12px;">`;
      transactions.slice(0, 10).forEach(t => {
        html += `<tr><td>${t.from.slice(0,6)}</td><td>${t.to.slice(0,6)}</td><td>${t.amount}</td><td>${t.type}</td> </tr>`;
      });
      html += `</table>
        <h4>Adjust Balance</h4>
        <input id="adjAddress" placeholder="Address"><input id="adjAmount" placeholder="Amount (+/-)"><select id="adjType"><option>main</option><option>farming</option></select>
        <button id="adjBtn">Apply</button>
        <h4>Freeze User</h4>
        <input id="freezeAddress" placeholder="Address"><button id="freezeBtn">Freeze</button><button id="unfreezeBtn">Unfreeze</button>
        <h4>Manual Verify</h4>
        <input id="verifyAddress" placeholder="Address"><button id="verifyBtn">Verify</button>
        <h4>Change Setting</h4>
        <input id="settingKey" placeholder="Key (e.g. farmingDailyReward)"><input id="settingValue" placeholder="Value"><button id="setSettingBtn">Set</button>
      </div>`;
      document.getElementById('mainContent').innerHTML = html;
      document.getElementById('adjBtn')?.addEventListener('click', async () => {
        const address = document.getElementById('adjAddress').value;
        const amount = parseFloat(document.getElementById('adjAmount').value);
        const type = document.getElementById('adjType').value;
        if (!address || isNaN(amount)) return;
        await callBackend("admin", { adminAction: "adjustBalance", params: { address, amount, walletType: type }, password: window.adminPassword });
        showAlert("Balance adjusted", "success");
        showAdminPanel();
      });
      document.getElementById('freezeBtn')?.addEventListener('click', async () => {
        const address = document.getElementById('freezeAddress').value;
        await callBackend("admin", { adminAction: "freezeUser", params: { address, frozen: true }, password: window.adminPassword });
        showAlert("User frozen", "success");
      });
      document.getElementById('unfreezeBtn')?.addEventListener('click', async () => {
        const address = document.getElementById('freezeAddress').value;
        await callBackend("admin", { adminAction: "freezeUser", params: { address, frozen: false }, password: window.adminPassword });
        showAlert("User unfrozen", "success");
      });
      document.getElementById('verifyBtn')?.addEventListener('click', async () => {
        const address = document.getElementById('verifyAddress').value;
        await callBackend("admin", { adminAction: "manualVerify", params: { address }, password: window.adminPassword });
        showAlert("User verified manually", "success");
      });
      document.getElementById('setSettingBtn')?.addEventListener('click', async () => {
        const key = document.getElementById('settingKey').value;
        const value = parseFloat(document.getElementById('settingValue').value);
        await callBackend("admin", { adminAction: "changeSetting", params: { key, value }, password: window.adminPassword });
        showAlert("Setting updated", "success");
      });
    } catch (err) {
      showAlert(err.message, "error");
    }
  }

  async function showPage(page) {
    switch(page) {
      case 'dashboard': renderDashboard(); break;
      case 'create':
        document.getElementById('mainContent').innerHTML = `<div class="card"><button id="createNow">Create Wallet</button></div>`;
        document.getElementById('createNow')?.addEventListener('click', createWallet);
        break;
      case 'transfer':
        document.getElementById('mainContent').innerHTML = `
          <div class="card">
            <h3>Transfer DGUSDT</h3>
            <input id="toAddress" placeholder="Recipient DG address">
            <input id="amount" placeholder="Amount (min 5)">
            <button id="doTransfer">Send</button>
          </div>`;
        document.getElementById('doTransfer')?.addEventListener('click', async () => {
          const to = document.getElementById('toAddress').value;
          const amount = parseFloat(document.getElementById('amount').value);
          if (!to || isNaN(amount)) return;
          try {
            await callBackend("transfer", { fromAddress: currentUser.publicAddress, toAddress: to, amount });
            showAlert("Transfer successful", "success");
            refreshUserData();
          } catch (err) { showAlert(err.message, "error"); }
        });
        break;
      case 'internal':
        document.getElementById('mainContent').innerHTML = `
          <div class="card">
            <h3>Farming → Main Wallet</h3>
            <input id="internalAmount" placeholder="Amount (min 5)">
            <button id="doInternal">Transfer</button>
          </div>`;
        document.getElementById('doInternal')?.addEventListener('click', async () => {
          const amount = parseFloat(document.getElementById('internalAmount').value);
          if (isNaN(amount)) return;
          try {
            await callBackend("internalTransfer", { address: currentUser.publicAddress, amount });
            showAlert("Internal transfer successful", "success");
            refreshUserData();
          } catch (err) { showAlert(err.message, "error"); }
        });
        break;
      case 'farming':
        document.getElementById('mainContent').innerHTML = `<div class="card"><h3>Farming Account</h3><p>Daily check-in: +0.1 DGUSDT. Miss a day: -0.05 penalty.</p><button id="farmCheckin">Check-in Now</button></div>`;
        document.getElementById('farmCheckin')?.addEventListener('click', async () => {
          await callBackend("dailyCheckIn", { address: currentUser.publicAddress });
          refreshUserData();
        });
        break;
      case 'mainFarming':
        document.getElementById('mainContent').innerHTML = `<div class="card"><h3>Main Wallet Farming</h3><p>Hold ≥100 DGUSDT and be verified to earn +1 DGUSDT every 24h.</p><button id="mainFarmBtn">Claim Reward</button></div>`;
        document.getElementById('mainFarmBtn')?.addEventListener('click', async () => {
          await callBackend("mainFarmingCheckIn", { address: currentUser.publicAddress });
          refreshUserData();
        });
        break;
      case 'admin':
        await showAdminPanel();
        break;
      case 'howto':
        document.getElementById('mainContent').innerHTML = `<div class="card"><h3>How to Create Wallet</h3><p>Click "Create New Wallet" – no signup needed. Your unique address and avatar will be generated automatically.</p></div>`;
        break;
      case 'verify':
        document.getElementById('mainContent').innerHTML = `<div class="card"><h3>How to Get Verified</h3><p>Either:</p><ul><li>Farming Account ≥10 DGUSDT AND Main Wallet ≥5 DGUSDT, OR</li><li>Send 5 USDT (BEP20) to dev wallet and submit proof to admin.</li></ul></div>`;
        break;
    }
  }

  function showAlert(msg, type) {
    const div = document.createElement('div');
    div.className = `alert alert-${type}`;
    div.innerText = msg;
    const content = document.getElementById('mainContent');
    content.prepend(div);
    setTimeout(() => div.remove(), 3000);
  }

  // Drawer logic
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
  document.getElementById('menuBtn').onclick = () => { drawer.classList.add('open'); overlay.classList.add('show'); };
  document.getElementById('closeDrawer').onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('show'); };
  overlay.onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('show'); };
  document.querySelectorAll('.drawer a').forEach(link => {
    link.onclick = (e) => {
      e.preventDefault();
      const page = link.getAttribute('data-page');
      if (page) showPage(page);
      drawer.classList.remove('open');
      overlay.classList.remove('show');
    };
  });

  // Start
  loadStoredUser();
</script>
</body>
</html>
